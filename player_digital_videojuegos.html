<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#bf00ff">
    <title>PLAYER - GAMER EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --neon: #bf00ff;
            --bg: #0d0d0d;
            --accent: #ff0055;
            --gold: #ffd700;
            --glass: rgba(15, 15, 15, 0.7);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a0033, #0d0d0d);
        }

        .tab-bar {
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-top: 1px solid #333;
            height: 65px;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 1000;
        }

        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-family: 'Bungee';
            font-size: 0.6em;
            background: none;
            border: none;
        }

        .tab-btn.active { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .tab-content { display: none; width: 100%; height: 100%; padding: 15px; padding-bottom: 80px; flex-direction: column; align-items: center; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .logo { font-family: 'Press Start 2P', cursive; font-size: 1.2em; color: var(--neon); margin: 20px 0; text-align: center; }

        input { background: #222; border: 2px solid #444; color: #fff; padding: 12px; border-radius: 10px; width: 80%; margin-bottom: 10px; text-align: center; font-family: 'Bungee'; }

        .btn { background: var(--neon); color: #fff; border: none; padding: 15px; border-radius: 30px; font-family: 'Press Start 2P'; font-size: 0.8em; width: 80%; cursor: pointer; box-shadow: 0 0 15px var(--neon); }

        .card-container { perspective: 1000px; width: 220px; height: 320px; margin: 20px 0; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; border: 2px solid var(--neon); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; background: var(--glass); backdrop-filter: blur(10px); }
        .card-back { transform: rotateY(180deg); border-color: var(--gold); }

        #c-artist { font-size: 0.7em; color: #aaa; margin-bottom: 10px; }
        #c-song { font-family: 'Press Start 2P'; font-size: 0.9em; margin-bottom: 15px; }
        #c-year { font-family: 'Press Start 2P'; font-size: 3em; color: var(--gold); }

        .timeline-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; margin-top: 10px; }
        .slot { height: 40px; background: #222; border: 1px solid #444; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-family: 'Bungee'; font-size: 0.7em; }
        .slot.active-guess { border-color: #fff; background: #333; box-shadow: 0 0 10px #fff; }
        .slot.filled { background: var(--neon); color: #000; border-color: #fff; }

        .btn-play.playing { background: #00ff88; color: #000; box-shadow: 0 0 20px #00ff88; }
    </style>
</head>

<body>
    <div id="login-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
        <div class="logo">GAMER EDITION</div>
        <input type="text" id="player-name" placeholder="TU NOMBRE">
        <button class="btn" onclick="joinGame()">ENTRAR</button>
    </div>

    <div id="game-container" style="display:none; height:100%;">
        <div id="tab-play" class="tab-content active">
            <div id="turn-status" style="font-family:'Bungee'; font-size:0.8em; color:var(--neon); margin-bottom:10px;">ESPERANDO TURNO...</div>
            
            <div id="controls" style="display:none; width:100%; flex-direction:column; align-items:center;">
                <button class="btn btn-play" id="play-btn" onclick="sendCommand('PLAY')" style="margin-bottom:10px;">PLAY</button>
                <button class="btn" onclick="sendCommand('STOP')" style="background:var(--accent); box-shadow:0 0 15px var(--accent);">STOP / REVELAR</button>
            </div>

            <div class="card-container">
                <div class="card" id="main-card">
                    <div class="card-face card-front">
                        <div style="font-family:'Press Start 2P'; color:var(--neon);">?</div>
                    </div>
                    <div class="card-face card-back">
                        <div id="c-artist">ESTUDIO</div>
                        <div id="c-song">VIDEOJUEGO</div>
                        <div id="c-year">????</div>
                    </div>
                </div>
            </div>

            <div class="timeline-grid" id="timeline-slots">
                <!-- 11 Slots for 10 cards -->
            </div>
        </div>

        <div id="tab-sabotage" class="tab-content">
            <div class="logo" style="font-size:0.8em;">SABOTAJES</div>
            <p style="font-size:0.7em; color:#888;">SECCIÓN EN DESARROLLO</p>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('play')"><span>JUGAR</span></button>
            <button class="tab-btn" onclick="switchTab('sabotage')"><span>SABOTAJE</span></button>
        </div>
    </div>

    <script>
        var peer, conn, myName, myCards = [], activeGuess = null;

        function joinGame() {
            myName = document.getElementById('player-name').value;
            if(!myName) return;
            peer = new Peer();
            peer.on('open', function(id) {
                var code = prompt("CÓDIGO DE SALA:");
                if(!code) return;
                conn = peer.connect("CB-HOST-" + code.toUpperCase());
                conn.on('open', function() {
                    conn.send({type: 'JOIN', name: myName});
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                });
                conn.on('data', handleData);
            });
        }

        function handleData(data) {
            if(data.type === 'STATE_UPDATE') {
                var me = data.players.find(p => p.name === myName);
                if(me) {
                    myCards = me.cards;
                    updateTimeline(data.activeTimeline);
                }
                
                var isActive = (data.activePlayer && data.activePlayer.name === myName);
                document.getElementById('turn-status').innerText = isActive ? "¡ES TU TURNO!" : "TURNO DE: " + data.activePlayer.name;
                document.getElementById('controls').style.display = isActive ? 'flex' : 'none';
                
                if(data.revealed) {
                    document.getElementById('main-card').classList.add('flipped');
                    document.getElementById('c-artist').innerText = data.currentTrack.artist;
                    document.getElementById('c-song').innerText = data.currentTrack.song;
                    document.getElementById('c-year').innerText = data.currentTrack.year;
                } else {
                    document.getElementById('main-card').classList.remove('flipped');
                }

                var pb = document.getElementById('play-btn');
                if(data.isPlaying) { pb.innerText = "SONANDO..."; pb.classList.add('playing'); }
                else { pb.innerText = "PLAY"; pb.classList.remove('playing'); }
            }
        }

        function updateTimeline(timeline) {
            var h = "";
            var numSlots = timeline.length + 1;
            for(var i=0; i<numSlots; i++) {
                var isFilled = false; // Logic for filled slots simplified for brevity
                h += '<div class="slot '+(activeGuess === i ? 'active-guess' : '')+'" onclick="makeGuess('+i+')">'+(i+1)+'</div>';
            }
            document.getElementById('timeline-slots').innerHTML = h;
        }

        function makeGuess(idx) {
            activeGuess = idx;
            conn.send({type: 'COMMAND', action: 'GUESS', value: idx});
        }

        function sendCommand(action) { conn.send({type: 'COMMAND', action: action}); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            // Add active class to button logic
        }
    </script>
</body>
</html>
