<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#00f2fe">
    <title>HOST - CHRONOBEATS ORIGINAL EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --neon: #00f2fe;
            --bg: #0d0d0d;
            --accent: #ff0055;
            --gold: #ffd700;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .logo {
            font-family: 'Bungee';
            font-size: 2em;
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon);
            text-align: center;
            margin-bottom: 20px;
        }

        #lobby {
            text-align: center;
            max-width: 600px;
            margin: auto;
            padding-top: 50px;
        }

        .room-code {
            font-family: 'Bungee';
            font-size: 4em;
            color: var(--gold);
            letter-spacing: 10px;
            margin: 20px 0;
            text-transform: uppercase;
        }

        .player-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .player-tag {
            background: #222;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            font-family: 'Bungee';
            font-size: 0.8em;
            text-transform: uppercase;
        }

        #dashboard {
            display: none;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: auto;
            min-height: 0;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        .active-player-name {
            font-family: 'Bungee';
            font-size: 1.5em;
            color: var(--neon);
            margin-top: 5px;
        }

        .leader-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
        }

        .leader-item.active {
            border-left: 4px solid var(--neon);
        }

        #player-container {
            position: absolute;
            top: -999px;
            left: -999px;
            opacity: 0.1;
        }

        #player-container iframe { width: 1px; height: 1px; border: none; }

        .validation-area {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .val-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--neon);
            width: 100%;
            text-align: center;
        }

        .val-card h3 {
            font-family: 'Bungee';
            font-size: 1.5em;
            margin: 10px 0;
        }

        .reveal-btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-family: 'Bungee';
            cursor: pointer;
        }

        .btn-val {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Bungee';
            font-size: 1em;
            cursor: pointer;
        }

        .btn-ok { background: #00ff88; color: #000; }
        .btn-fail { background: var(--accent); color: #fff; }

        .timeline-grid { display: grid; gap: 10px; margin-top: 20px; }
        .player-row { background: #161616; padding: 10px; border-radius: 10px; }
        .slots { display: flex; gap: 5px; overflow-x: auto; }
        .slot {
            min-width: 45px; height: 25px; background: #222; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; color: #666;
        }
        .slot.filled { background: var(--neon); color: #000; font-weight: bold; border: 1px solid #fff; }

        .btn-start {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-family: 'Bungee';
            font-size: 1.4em;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon);
        }

        #winner-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 1000; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .active-player-cards {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            margin-top: 15px; padding: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 10px;
        }

        .mini-card {
            background: #222; border: 1px solid var(--neon); padding: 5px 10px;
            border-radius: 5px; font-family: 'Bungee'; font-size: 0.9em; color: #fff;
        }

        .neon-chip {
            display: inline-block; width: 10px; height: 10px; background: var(--neon);
            border-radius: 50%; box-shadow: 0 0 8px var(--neon); margin: 0 3px; vertical-align: middle;
        }

        .btn-hub {
            position: fixed; top: 20px; left: 20px; z-index: 10000;
            width: 55px; height: 55px; background: #000; border: 2px solid var(--neon);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--neon); text-decoration: none; font-family: 'Bungee'; font-size: 1.5em;
        }

        #flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
        }
        @keyframes gunshot-flash {
            0% { opacity: 0; }
            10% { opacity: 0.9; }
            100% { opacity: 0; }
        }
        .animate-flash {
            animation: gunshot-flash 0.4s ease-out forwards;
        }
    </style>
</head>

<body>
    <div id="flash-overlay"></div>
    <div id="joputismo-audio-player" style="display:none;"></div>
    <div id="audio-player-container" style="display:none;"></div>
    <a href="index.html" class="btn-hub" title="Volver al Hub">H</a>
    <div id="winner-screen">
        <h1 style="font-family:'Bungee'; color:var(--gold);">VICTORIA MAGISTRAL!</h1>
        <div id="winner-avatar-img" style="margin: 20px 0;"></div>
        <h2 id="winner-name" style="font-family:'Bungee'; color:var(--neon);">---</h2>
        <button class="btn-start" onclick="location.reload()" style="margin-top:30px">OTRA RONDA</button>
    </div>
    
    <div class="logo">CHRONOBEATS<br><span style="font-size:0.5em; opacity:0.6;">ORIGINAL EDITION</span></div>
    
    <div id="live-room-code" style="display:none; position:fixed; top:20px; right:20px; background:var(--bg); border:1px solid var(--neon); color:var(--neon); padding:8px 15px; border-radius:10px; font-family:'Bungee'; font-size:1.2em; z-index:10000;">CODE</div>
    
    <div id="lobby">
        <div class="room-code" id="join-code">------</div>
        <div class="player-list" id="lobby-players"></div>

        <div id="mode-selector" style="margin-top: 30px; margin-bottom: 20px;">
            <label style="font-family:'Bungee'; color:var(--neon); font-size:1em; display:block; margin-bottom:10px;">MODO DE JUEGO</label>
            <select id="game-mode-select" style="padding:10px; font-family:'Montserrat'; border-radius:8px; background:#222; color:#fff; border:1px solid var(--neon);">
                <option value="normal">CLÁSICO (Gana a las 10)</option>
                <option value="rey">MODO REY (Adivina Año Final)</option>
            </select>
        </div>

        <div id="joputismo-container-lobby" style="margin-bottom: 20px;">
            <label style="font-family:'Bungee'; color:#ff0055; font-size:1em; display:block; margin-bottom:10px;">NIVEL DE JOPUTISMO</label>
            <select id="joputismo-select-lobby" onchange="setJoputismo(this.value)" style="padding:10px; font-family:'Montserrat'; border-radius:8px; background:#222; color:#fff; border:1px solid #ff0055;">
                <option value="0">LOSER (Pacífico)</option>
                <option value="1">TROLL (Nivel Cabrón)</option>
                <option value="2">SUPERMAN (Guerra Total)</option>
            </select>
        </div>

        <button class="btn-start" onclick="startGame()" style="display:none; margin-top:20px;" id="start-btn">EMPEZAR PARTIDA</button>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <div style="text-align:center; margin-bottom:10px;">
                <p style="font-size: 0.7em; color:#888; font-family:'Bungee';">TURNO:</p>
                <div class="active-player-name" id="ui-current-player">---</div>
            </div>
            
            <div style="margin-bottom: 20px; text-align: center; border-top: 1px solid #333; padding-top: 10px; border-bottom: 1px solid #333; padding-bottom: 15px;">
                <label style="font-family:'Bungee'; color:#ff0055; font-size:0.6em; display:block; margin-bottom:5px;">JOPUTISMO</label>
                <select id="joputismo-select-game" onchange="setJoputismo(this.value)" style="width:100%; padding:5px; font-family:'Montserrat'; font-size:0.8em; border-radius:5px; background:#111; color:#ff0055; border:1px solid #ff0055;">
                    <option value="0">LOSER</option>
                    <option value="1">TROLL</option>
                    <option value="2">SUPERMAN</option>
                </select>
            </div>
            <div id="leaderboard-list"></div>
        </div>
        
        <div class="main-content">
            <div id="player-container"><div id="youtube-player"></div></div>
            <div class="validation-area">
                <div class="val-card" id="val-card-ui" style="display:none;">
                    <p style="font-family:'Bungee'; font-size:1em; color:var(--neon); margin-bottom:10px;">SONANDO AHORA</p>
                    <p id="ui-card-artist" style="font-size:0.9em; color:#aaa; margin:0; font-weight:bold;">????</p>
                    <h3 id="ui-card-song" style="margin:5px 0;">????</h3>
                    <div id="ui-card-year" style="font-family:'Bungee'; font-size:4em; color:var(--accent); line-height:1;">????</div>
                    <button class="reveal-btn" id="btn-reveal-host" onclick="revealData()" style="display:block; margin:20px auto;">REVELAR DATOS</button>
                    
                    <div class="actions" id="validation-buttons" style="display:none;">
                        <button class="btn-val btn-ok" onclick="validateResult(true, false)">ACERTÓ</button>
                        <button class="btn-val btn-ok" style="background:#ffd700;" onclick="validateResult(true, true)">PERFECTO + <span class="neon-chip"></span></button>
                        <button class="btn-val btn-fail" onclick="validateResult(false, false)">FALLÓ</button>
                    </div>
                    <div id="challenger-validation" style="display:none; margin-top:15px;">
                        <p style="font-family:'Bungee'; color:var(--gold); font-size:0.8em; margin-bottom:8px;">¿QUIÉN APOSTÓ BIEN?</p>
                        <div id="challenger-buttons" style="display:flex; flex-direction:column; gap:8px;"></div>
                    </div>
                </div>
                <div id="host-instructions" style="font-family:'Bungee'; font-size:1.2em; text-align:center;">ESPERANDO...</div>
                <div id="active-player-inventory" class="active-player-cards"></div>
            </div>
        </div>
    </div>
    
    <div class="timeline-grid" id="global-timelines"></div>

    <script>
        var peer, roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        var ytPlayer, players = [], connections = {}, songs = [], currentSongIdx = -1, activePlayerIdx = 0;
        var isRevealed = false, isPlaying = false, isMuted = false;
        var currentBets = {}, activeGuess = null, bettingAgainst = [], bettingFor = [];
        var gameMode = 'normal', turnPhase = 'NORMAL', kingOptions = [], gameStarted = false;
        var muteTimeRemaining = 0, muteIntervalTimer = null, panicTimer = 0, panicActive = false, panicInterval = null;
        var joputismoLevel = 0, isFogActive = false, hasShield = {}, duelTriggered = false, currentDuel = null;
        var cheatsEnabled = true, duelResult = null, segundosAcumulados = 0, momentoDeInicio = 0;
        var queuedDuel = null, joputismoAudioTimeout = null, wakeLock = null;

        document.getElementById('join-code').innerText = roomCode;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange, 'onError': () => handlePlayerCommand('SYSTEM', 'SYSTEM_ERROR_TRACK', null) }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                isPlaying = true;
                document.getElementById('host-instructions').innerText = isMuted ? "PLAYING (MUTE)" : "PLAYING";
                syncState();
            } else if (event.data === YT.PlayerState.PAUSED) {
                isPlaying = false;
                syncState();
            } else if (event.data === YT.PlayerState.ENDED) {
                handleSongEnd();
            }
        }

        function handleSongEnd() {
            if (!isRevealed) {
                isPlaying = false;
                document.getElementById('host-instructions').innerHTML = "<span style='color:#ff0055; font-family:Bungee;'>TIEMPO AGOTADO! ⏰</span>";
                setTimeout(nextTurn, 4000);
                syncState();
            }
        }

        function initPeer() {
            peer = new Peer("CB-HOST-" + roomCode, {
                debug: 3,
                host: '0.peerjs.com',
                port: 443,
                secure: true,
                path: '/',
                pingInterval: 5000,
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:global.stun.twilio.com:3478' },
                        { urls: 'stun:stun.cloudflare.com:3478' },
                        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                        { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
                        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
                    ]
                }
            });
            peer.on('open', id => {
                document.getElementById('live-room-code').innerText = roomCode;
                document.getElementById('live-room-code').style.display = 'block';
            });
            peer.on('connection', conn => {
                conn.on('data', data => {
                    if (data.type === 'JOIN') {
                        let existing = players.find(p => p.name.toLowerCase() === data.name.toLowerCase());
                        if (existing) {
                            existing.id = conn.peer;
                            existing.avatar = data.avatar || existing.avatar;
                            connections[conn.peer] = conn;
                        } else {
                            players.push({ id: conn.peer, name: data.name, avatar: data.avatar || null, score: 1, cards: [], tokens: 2, canReload: true, wildcards: 3 });
                            connections[conn.peer] = conn;
                        }
                        updateLobby();
                        syncState();
                    } else if (data.type === 'AVATAR_UPDATE') {
                        var existing = players.find(function(p){ return p.name.toLowerCase() === data.name.toLowerCase(); });
                        if (existing) { existing.avatar = data.avatar; updateLobby(); }
                    } else if (data.type === 'COMMAND') {
                        handlePlayerCommand(conn.peer, data.action, data.value);
                    }
                });
            });
        }

        function updateLobby() {
            let h = "";
            players.forEach(p => {
                let av = p.avatar ? `<img src="${p.avatar}" style="width:30px;height:30px;border-radius:50%;margin-right:8px;border:2px solid var(--neon);">` : `<div style="width:30px;height:30px;border-radius:50%;background:#222;border:2px solid var(--neon);display:inline-flex;align-items:center;justify-content:center;margin-right:8px;font-family:'Bungee';">${p.name[0]}</div>`;
                h += `<div class="player-tag">${av}${p.name}</div>`;
            });
            document.getElementById('lobby-players').innerHTML = h;
            if (players.length >= 1) document.getElementById('start-btn').style.display = 'inline-block';
        }

        function startGame() {
            requestWakeLock();
            gameMode = document.getElementById('game-mode-select').value;
            players.forEach(p => {
                currentSongIdx++;
                if (songs[currentSongIdx]) p.cards.push(songs[currentSongIdx].year);
            });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
            gameStarted = true;
            nextTurn();
        }

        function nextTurn() {
            turnPhase = 'NORMAL'; currentDuel = null; isRevealed = false; isPlaying = false;
            currentSongIdx++;
            currentBets = {}; activeGuess = null; bettingAgainst = []; bettingFor = [];
            isMuted = false; muteTimeRemaining = 0; if (muteIntervalTimer) clearInterval(muteIntervalTimer);
            panicActive = false; panicTimer = 0; if (panicInterval) clearInterval(panicInterval);
            
            if (gameMode === 'rey' && players.length >= 3 && players[activePlayerIdx] && players[activePlayerIdx].score >= 10) {
                turnPhase = 'KING_SELECTION';
                kingOptions = [];
                for(let i=0; i<Math.max(1, players.length - 1); i++){
                    currentSongIdx++; if(songs[currentSongIdx]) kingOptions.push(songs[currentSongIdx]);
                }
                document.getElementById('ui-card-artist').innerText = "ELIGIENDO...";
                document.getElementById('ui-current-player').innerText = players[activePlayerIdx].name + " (KING)";
                syncState(); return;
            }

            let s = songs[currentSongIdx];
            document.getElementById('ui-card-artist').innerText = "????";
            document.getElementById('ui-card-song').innerText = "????";
            document.getElementById('ui-card-year').innerText = "????";
            document.getElementById('btn-reveal-host').style.display = 'block';
            document.getElementById('val-card-ui').style.display = 'block';
            document.getElementById('validation-buttons').style.display = 'none';
            document.getElementById('challenger-validation').style.display = 'none';
            document.getElementById('ui-current-player').innerText = players[activePlayerIdx].name;
            if (ytPlayer && ytPlayer.loadVideoById && s) { ytPlayer.loadVideoById({ videoId: s.id, startSeconds: 0 }); ytPlayer.stopVideo(); }
            syncState();
        }


        function updateTokens(player, delta) {
            if (!player) return;
            player.tokens = Math.max(0, Math.min(5, (player.tokens || 0) + delta));
        }

        function playBuzzerWebAudio() {
            try { var audio = new Audio('https://www.myinstants.com/media/sounds/wrong-answer-buzzer.mp3'); audio.play(); } catch(e) {}
        }

        function playGunshot() {
            try { var audio = new Audio('https://www.myinstants.com/media/sounds/pistol-shot.mp3'); audio.play(); } catch(e) {}
        }

        function playDuelMusic() {
            var tc = document.getElementById('joputismo-audio-player');
            if (tc) tc.innerHTML = '<iframe id="duel-iframe" width="1" height="1" src="https://www.youtube-nocookie.com/embed/AFa1-kciCb4?autoplay=1&end=45" allow="autoplay" style="display:none;"></iframe>';
        }

        function triggerFlash() {
            var overlay = document.getElementById('flash-overlay');
            if (overlay) { overlay.classList.remove('animate-flash'); void overlay.offsetWidth; overlay.classList.add('animate-flash'); }
        }

        function refundBets() {
            if (bettingAgainst.length > 0) { bettingAgainst.forEach(function(pid){ var p=players.find(pl=>pl.id===pid); if(p) updateTokens(p,1); }); }
            if (bettingFor.length > 0) { bettingFor.forEach(function(pid){ var p=players.find(pl=>pl.id===pid); if(p) updateTokens(p,1); }); }
            bettingAgainst = []; bettingFor = [];
        }


        function resolveDuel() {
            if (!currentDuel) return;
            var s = songs[currentSongIdx];
            var actualYear = parseInt(s.year);
            var ch = players.find(p => p.id === currentDuel.challenger);
            var tg = players.find(p => p.id === currentDuel.target);
            
            var chDist = currentDuel.challengerYear !== null ? Math.abs(currentDuel.challengerYear - actualYear) : 999;
            var tgDist = currentDuel.targetYear !== null ? Math.abs(currentDuel.targetYear - actualYear) : 999;
            
            var winnerId = null;
            if (chDist < tgDist) {
                winnerId = currentDuel.challenger;
            } else if (tgDist < chDist) {
                winnerId = currentDuel.target;
            } else {
                // Empate en distancia o ambos exactos
                // Quick Draw: el que tenga el timestamp más bajo gana
                if (currentDuel.challengerTime < currentDuel.targetTime) {
                    winnerId = currentDuel.challenger;
                } else {
                    winnerId = currentDuel.target;
                }
            }
            
            var winner = players.find(p => p.id === winnerId);
            var loser = players.find(p => p.id === (winnerId === (ch ? ch.id : currentDuel.challenger) ? (tg ? tg.id : currentDuel.target) : (ch ? ch.id : currentDuel.challenger)));
            
            // Frases cabronas
            var winnerPhrases = [
                "¡Felicidades, lumbreras! Hasta un reloj parado acierta dos veces al día.",
                "Qué potra tienes, chaval. A la próxima no te salva ni la caridad.",
                "¡Victoria! Aunque con esa cara, dudo que te sirva de mucho.",
                "Mira cómo brilla... es tu ego, no tu inteligencia."
            ];
            var loserPhrases = [
                "¡Qué ridículo! Mi abuela sorda lo habría hecho mejor.",
                "A fregar, que para adivinar años no sirves.",
                "¿En serio? ¿Ese año? Vuelve a la guardería.",
                "Palizón gitano. A casa a llorar con tu madre."
            ];

            duelResult = {
                winnerId: winner.id,
                loserId: loser.id,
                winnerMsg: winnerPhrases[Math.floor(Math.random() * winnerPhrases.length)],
                loserMsg: loserPhrases[Math.floor(Math.random() * loserPhrases.length)]
            };
            
            if (winner && loser) {
                // Premio: Gana la carta
                winner.score++;
                winner.cards.push(actualYear);
                winner.cards.sort(function(a, b){return a - b});
                
                // Robo: 2 fichas al oponente (Capped at 5)
                var theft = Math.min(loser.tokens, 2);
                updateTokens(loser, -theft);
                triggerFlash();
                updateTokens(winner, theft);
                
                document.getElementById('host-instructions').innerHTML = "<span style='color:var(--gold); font-size:1.5em; font-family:Bungee;'>¡" + winner.name + " GANA EL DUELO!</span><br>Robó " + theft + " fichas y se queda la carta.";
            } else {
                document.getElementById('host-instructions').innerHTML = "<span style='color:#ff4444; font-size:1.5em; font-family:Bungee;'>EL DUELO QUEDÓ DESIERTO</span>";
            }

                        bettingAgainst = [];
                        bettingFor = [];

                        document.getElementById('host-instructions').innerHTML = "<span style='color:#00f2fe; font-size:1.5em; font-family:Bungee;'>¡" + p.name + " HA ROBADO EL TURNO A " + oldActive.name + "!</span>";
                        setTimeout(function () {
                            if (!isRevealed && !panicActive) document.getElementById('host-instructions').innerText = (isMuted ? "REPRODUCIENDO (MUTE)" : "REPRODUCIENDO");
                        }, 4000);

                        syncState();
                    }
                    break;
                case 'SABOTAGE_BLACKHOLE':
                    var p = players.find(function (pl) { return pl.id === peerId; });
                    if (p && p.id !== players[activePlayerIdx].id && p.tokens >= 5 && (!turnPhase || turnPhase === 'NORMAL')) {
                        var validTargets = players.filter(function (t) { return t.id !== p.id && t.score > 1; });
                        if (validTargets.length > 0) {
                            updateTokens(p, -5);
                            var target = validTargets[Math.floor(Math.random() * validTargets.length)];
                            target.score -= 1;
                            var cardIdx = Math.floor(Math.random() * target.cards.length);
                            target.cards.splice(cardIdx, 1);

                            document.getElementById('host-instructions').innerHTML = "<span style='color:#9900ff; font-size:1.5em; font-family:Bungee;'>¡" + p.name + " CREÓ UN AGUJERO NEGRO Y DESTRUYÓ UNA CARTA DE " + target.name + "!</span>";
                            setTimeout(function () {
                                if (!isRevealed && !panicActive) document.getElementById('host-instructions').innerText = (isMuted ? "REPRODUCIENDO (MUTE)" : "REPRODUCIENDO");
                            }, 4000);
                            syncState();
                        }
                    }
                    break;
                case 'SABOTAGE_STEAL_TOKEN':
                    var p = players.find(function (pl) { return pl.id === peerId; });
                    if (p && p.tokens >= 4) {
                        var possibleTargets = players.filter(function (pt) { return pt.id !== peerId && pt.tokens > 0; });
                        if (possibleTargets.length > 0) {
                            updateTokens(p, -4); // Pay the cost
                            var target = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
                            updateTokens(target, -1);
                            updateTokens(p, 1);

                            // Send target an alert
                            var tConn = connections[target.id];
                            if (tConn) {
                                tConn.send({
                                    type: 'BET_RESULT',
                                    msg: "¡" + p.name + " TE HA ROBADO 1 FICHA! 🥷"
                                });
                            }

                            triggerFlash();
                            document.getElementById('host-instructions').innerHTML = "<span style='color:#ffff00; font-size:1.2em;'>¡" + p.name + " HA ROBADO A " + target.name + "!</span>";
                            setTimeout(function () {
                                if (!isRevealed && !panicActive) document.getElementById('host-instructions').innerText = (isMuted ? "REPRODUCIENDO (MUTE)" : "REPRODUCIENDO");
                            }, 3000);

                            syncState();
                        }
                    }
                    break;
                case 'GUESS':
                    console.log("[GUESS] de", peerId, "en slot", value);
                    var p = players.find(function (pl) { return pl.id === peerId; });
                    var valNum = parseInt(value);
                    if (isNaN(valNum)) break;

                    var slotOccupiedByBet = false;
                    for (var pid in currentBets) { if (currentBets[pid] == valNum) slotOccupiedByBet = true; }

                    if (p && p.id === players[activePlayerIdx].id && !slotOccupiedByBet && activeGuess === null) {
                        console.log("[OK] Marca del activo fijada en", valNum);
                        activeGuess = valNum;

                        // STOP PANIC TIMER IF ACTIVE
                        if (panicActive) {
                            clearInterval(panicInterval);
                            panicInterval = null;
                            panicActive = false;
                            panicTimer = 0;
                            console.log("[PANIC] Temporizador detenido por respuesta rápida.");
                        }

                        syncState();
                    } else {
                        console.log("[FAIL] Guess rechazado. ¿Ya hay marca?", activeGuess !== null);
                    }
                    break;
                case 'KING_SELECT_CARD':
                    if (turnPhase !== 'KING_SELECTION') return;
                    if (peerId === players[activePlayerIdx].id) return; // Rey no puede elegir

                    var indexElegido = parseInt(value);
                    if (indexElegido >= 0 && indexElegido < kingOptions.length) {
                        var cartaElegida = kingOptions[indexElegido];
                        songs[currentSongIdx] = cartaElegida;
                        

                        turnPhase = 'KING_GUESS';
                        document.getElementById('ui-card-artist').innerText = "????";
                        document.getElementById('ui-card-song').innerText = "????";
                        document.getElementById('ui-card-year').innerText = "????";
                        document.getElementById('host-instructions').innerHTML = "CARTA ELEGIDA.<br>ESPERANDO A QUE EL REY INTRODUZCA EL AÑO...";
                        document.getElementById('player-container').innerHTML = '<div id="youtube-player"></div>';
                        syncState();
                    }
                    break;
                case 'KING_GUESS':
                    if (turnPhase !== 'KING_GUESS') return;
                    if (peerId !== players[activePlayerIdx].id) return; // Solo Rey

                    var guessedYear = parseInt(value);
                    if (!isNaN(guessedYear)) {
                        var s = songs[currentSongIdx];
                        var actualYear = parseInt(s.year);

                        document.getElementById('ui-card-artist').innerText = s.artist;
                        document.getElementById('ui-card-song').innerText = s.song;
                        document.getElementById('ui-card-year').innerText = actualYear;

                        var won = Math.abs(guessedYear - actualYear) <= 2;

                        var resultHtml = "";
                        if (won) {
                            resultHtml = "<span style='color:#00ff00; font-size:1.5em;'>¡EL REY ACERTÓ!</span><br>Dijo " + guessedYear + ". (El año era " + actualYear + ").";
                        } else {
                            resultHtml = "<span style='color:#ff4444; font-size:1.5em;'>¡FALLÓ!</span><br>Dijo " + guessedYear + ". (El año era " + actualYear + ").";
                        }
                        resultHtml += "<br><br><button class='btn' style='background:var(--neon); color:#000; padding:15px; font-size:1.2em; pointer-events:auto; position:relative; z-index:9999;' onclick='resolveKingMode(" + won + ")'>ACEPTAR RESULTADO</button>";

                        document.getElementById('host-instructions').innerHTML = resultHtml;
                        document.getElementById('host-instructions').style.pointerEvents = 'auto'; // Permitir click en el div global si está bloqueado

                        turnPhase = 'KING_GUESS_RESULT';
                        syncState();
                    }
                    break;
                case 'REMOTE_START_GAME':
                    startGame();
                    break;
                case 'REMOTE_REVEAL':
                    revealData();
                    break;
                case 'REMOTE_CORRECT':
                    validateResult(true, false);
                    break;
                case 'REMOTE_CORRECT_TOKEN':
                    validateResult(true, true);
                    break;
                case 'REMOTE_INCORRECT':
                    validateResult(false, false);
                    break;
                case 'REMOTE_INCORRECT_TOKEN':
                    validateResult(false, true);
                    break;
                case 'REMOTE_SYSTEM_ERROR':
                    reportSystemError();
                    break;
                case 'REMOTE_JOPUTISMO':
                    if (turnPhase === 'LOBBY' || players.length === 0) {
                        setJoputismo(parseInt(value));
                    }
                    break;
                case 'REMOTE_START_GAME':
                    if (!gameStarted) {
                        startGame();
                    }
                    break;
                case 'REMOTE_JOPUTISMO':
                    setJoputismo(value);
                    syncState();
                    break;
                case 'REMOTE_REVEAL':
                    if (turnPhase !== 'LOBBY' && !isRevealed) {
                        revealData();
                    }
                    break;
                case 'REMOTE_CORRECT':
                    validateResult(true, false);
                    break;
                case 'REMOTE_CORRECT_TOKEN':
                    validateResult(true, true);
                    break;
                case 'REMOTE_INCORRECT':
                    validateResult(false, false);
                    break;
                case 'REMOTE_INCORRECT_TOKEN':
                    validateResult(false, true);
                    break;
                case 'REMOTE_SYSTEM_ERROR':
                    reportSystemError();
                    break;
                case 'REMOTE_SET_GAME_MODE':
                    if (turnPhase === 'LOBBY') {
                        gameMode = value;
                        document.getElementById('game-mode-select').value = value;
                        syncState();
                    }
                    break;
                case 'REMOTE_KING_RESOLVE':
                    resolveKingMode(value === 'true' || value === true);
                    break;
                case 'REMOTE_NEXT_TURN':
                    if (turnPhase === 'DUEL' && !currentDuel) {
                        nextTurn();
                    } else if (isRevealed) {
                        nextTurn();
                    }
                    break;
                case 'REMOTE_DUEL_FINISH':
                    finishDuel();
                    break;
                case 'MARKET_WILDCARD':
                    var p = players.find(function (pl) { return pl.id === peerId; });
                    if (p && p.id === activeP.id && (p.wildcards === undefined || p.wildcards > 0)) {
                        if (p.wildcards === undefined) p.wildcards = 3;
                        p.wildcards--;
                        if (value === 'artist') {
                            document.getElementById('ui-card-artist').innerText = s.artist;
                            document.getElementById('ui-card-artist').style.color = "var(--gold)";
                        } else {
                            document.getElementById('ui-card-song').innerText = s.song;
                            document.getElementById('ui-card-song').style.color = "var(--gold)";
                        }
                        syncState();
                    }
                    break;
                case 'MARKET_DECADE':
                    var p = players.find(function (pl) { return pl.id === peerId; });
                    if (p && p.id === activeP.id && p.tokens >= 1) {
                        updateTokens(p, -1);
                        var sYear = parseInt(s.year);
                        var decadeStr = "Desconocida";
                        if (!isNaN(sYear)) {
                            decadeStr = Math.floor(sYear / 10) * 10 + "s";
                        }
                        try {
                            if (connections[p.id]) connections[p.id].send({ type: 'BET_RESULT', msg: "PISTA! Años " + decadeStr });
                        } catch (e) { }
                        syncState();
                    }
                    break;
                case 'MARKET_SHIELD':
                    var p = players.find(function (pl) { return pl.id === peerId; });
                    if (p && p.tokens >= 3 && !hasShield[p.id]) {
                        updateTokens(p, -3);
                        hasShield[p.id] = true;
                        try {
                            if (connections[p.id]) connections[p.id].send({ type: 'BET_RESULT', msg: "ESCUDO ACTIVADO! Tu proximo sabotaje enemigo será neutralizado." });
                        } catch (e) { }
                        syncState();
                    }
                    break;
            }
            // Eliminamos el syncState duplicado que podría causar problemas de carrera
        }

        function revealData() {
            isRevealed = true;
            if (ytPlayer) ytPlayer.pauseVideo();
            var s = songs[currentSongIdx];
            document.getElementById('ui-card-artist').innerText = s.artist;
            document.getElementById('ui-card-song').innerText = s.song;
            document.getElementById('ui-card-year').innerText = s.year;
            document.getElementById('btn-reveal-host').style.display = 'none';

            if (turnPhase === 'DUEL') {
                resolveDuel();
                return;
            }

            var isCorrect = activeGuess !== null && isSlotCorrect(activeGuess, parseInt(s.year), players[activePlayerIdx].cards);
            document.getElementById('validation-buttons').style.display = 'flex';
            document.getElementById('host-instructions').innerText = isCorrect ? "CORRECTO!" : "FALLO!";
            syncState();
        }

        function isSlotCorrect(idx, year, cards) {
            if (cards.length === 0) return true;
            if (idx === 0) return year <= cards[0];
            if (idx === cards.length) return year >= cards[cards.length - 1];
            return year >= cards[idx - 1] && year <= cards[idx];
        }

        function validateResult(isCardOk, isTokenOk) {
            let p = players[activePlayerIdx];
            if (isTokenOk) updateTokens(p, 1);
            // RESOLVER APUESTAS "NI DE COÑA" y "ESTOY CONTIGO"
            if ((bettingAgainst && bettingAgainst.length > 0) || (bettingFor && bettingFor.length > 0)) {
                if (isCardOk) {
                    // El jugador activo ACIERTA: los que apostaron en contra pierden. los que apostaron a favor ganan.
                    var losesPhrases = [
                        "Has dudado de un puto experto... y has perdido.",
                        "¿Ni de coña? Ni de coña vas a recuperar esa ficha, pringao.",
                        "Para la próxima te callas. El maestro sabe lo que hace.",
                        "A llorar a la llorería. Esa ficha es historia.",
                        "Has apostado contra Dios y te has quemado.",
                        "¿Te creías muy listo, eh? Pues toma zasca en toda la boca.",
                        "Poca fe para tanta ignorancia. Ficha perdida.",
                        "Silencio en la sala. Ha hablado el puto amo del tiempo.",
                        "Tu envidia alimenta su victoria. Menos 1 ficha para ti.",
                        "¿En serio pensabas que iba a fallar? Qué pardillo.",
                        "Nunca apuestes contra el jefe, novato.",
                        "Te has comido el amago entero. Despídete de la ficha.",
                        "Mucha boquita pero poca ficha te queda.",
                        "Con esa intuición de mierda normal que pierdas fichas.",
                        "Vaya patinazo. Esa masterclass te ha costado una ficha.",
                        "Has ido a por lana y has salido trasquilado.",
                        "Te ha retratado. Sigue mirando y aprende.",
                        "Ni de coña tienes tú tanto nivel. Ficha al pozo.",
                        "Acaso pensabas que dudar del amo del juego te iba a salir gratis?",
                        "Te pones chulito y te quedas sin blanca. Clásico.",
                        "Esa ficha era tuya, ahora es solo un mal recuerdo.",
                        "¿Querías sangre? Toma dos tazas de humillación.",
                        "Le has tirado un órdago y te ha sacado la chorra.",
                        "El rey no se mancha las manos con plebeyos como tú.",
                        "Has tropezado con la piedra de su sabiduría.",
                        "Ficha denegada por listillo. A tu cueva.",
                        "Te la ha clavado por la escuadra. A pastar.",
                        "Tu intento de sabotaje da más pena que otra cosa.",
                        "Otra fichita pal bote. Gracias por la donación, pringao.",
                        "Te iba a devolver la ficha por pena, pero mejor me la quedo.",
                        "Cárgate de paciencia, porque de fichas vas justito.",
                        "El oráculo musical ataca de nuevo. Tú agacha la cabeza.",
                        "Ni con un DeLorean aciertas tú tantas veces. Asúmelo.",
                        "Ojo al dato: acabas de perder una ficha contra el mejor.",
                        "Sigue apostando en contra, a ver si así te arruinas antes.",
                        "Dudar de un dios solo trae castigos divinos en forma de fichas.",
                        "¿Te sobra el dinero? Porque las fichas azules parece que las regalas.",
                        "Has intentado hacerle el lío al máster y has cobrado tú.",
                        "Por favor, un aplauso para el que acaba de perder otra ficha absurda.",
                        "El rey manda, tú pagas la entrada al espectáculo.",
                        "La próxima vez guarda la ficha, que igual te hace falta para no dar pena.",
                        "Que ponga la música y tú pones las fichas perdidas. Trato justo."
                    ];
                    if (bettingAgainst) {
                        bettingAgainst.forEach(function (pid) {
                            if (connections[pid]) {
                                var msg = losesPhrases[Math.floor(Math.random() * losesPhrases.length)];
                                connections[pid].send({ type: 'BET_RESULT', msg: "JAJAJAJA...\n\n" + msg });
                            }
                        });
                    }
                    if (bettingFor) {
                        bettingFor.forEach(function (pid) {
                            var p = players.find(x => x.id === pid);
                            if (p) {
                                updateTokens(p, 2);
                                if (connections[pid]) {
                                    connections[pid].send({ type: 'BET_RESULT', msg: "¡SABÍAS QUE IBA A ACERTAR Y HAS GANADO!\n\nRecompensa: +2 FICHAS AZULES." });
                                }
                            }
                        });
                    }
                } else {
                    // El jugador activo FALLA: los que apostaron en contra ganan. los que apostaron a favor pierden.
                    if (bettingAgainst) {
                        bettingAgainst.forEach(function (pid) {
                            var p = players.find(x => x.id === pid);
                            if (p) {
                                updateTokens(p, 2);
                                if (connections[pid]) {
                                    connections[pid].send({ type: 'BET_RESULT', msg: "¡SABÍAS QUE IBA A FALLAR Y HAS GANADO!\n\nRecompensa: +2 FICHAS AZULES." });
                                }
                            }
                        });
                    }
                    if (bettingFor) {
                        var losesPhrasesFor = [
                            "Confiaste en un inútil y has pagado el pato.",
                            "Tanta fe para nada. Menudo patinazo.",
                            "Ni estando contigo logra acertar. Ficha perdida.",
                            "Has apostado al caballo perdedor.",
                            "Qué mala vista tienes para elegir aliados."
                        ];
                        bettingFor.forEach(function (pid) {
                            if (connections[pid]) {
                                var msg = losesPhrasesFor[Math.floor(Math.random() * losesPhrasesFor.length)];
                                connections[pid].send({ type: 'BET_RESULT', msg: "JAJAJAJA...\n\n" + msg });
                            }
                        });
                    }
                }
            }

            if (isCardOk) {
                p.score++;
                p.cards.push(parseInt(songs[currentSongIdx].year));
                p.cards.sort(function(a,b){ return parseInt(a)-parseInt(b); });
                if (p.score >= 10 && gameMode === 'normal') { showWinner(p.name); return; }
                activePlayerIdx = (activePlayerIdx + 1) % players.length;
                players[activePlayerIdx].canReload = true; // canReload al SIGUIENTE jugador (el que va a jugar)
                nextTurn();
            } else {
                let challengersExist = Object.keys(currentBets).length > 0;
                let anyChallengerCorrect = false;
                for (let pid in currentBets) {
                    if (isSlotCorrect(currentBets[pid], parseInt(songs[currentSongIdx].year), p.cards)) anyChallengerCorrect = true;
                }

                if (challengersExist && anyChallengerCorrect) {
                    document.getElementById('host-instructions').innerText = "VAMOS A LAS APUESTAS...";
                    document.getElementById('validation-buttons').style.display = 'none';
                    document.getElementById('challenger-validation').style.display = 'block';
                    let h = "";
                    for (let pid in currentBets) {
                        let cp = players.find(x => x.id === pid);
                        let slotOk = isSlotCorrect(currentBets[pid], parseInt(songs[currentSongIdx].year), p.cards);
                        if (cp && slotOk) {
                            h += `<button class="btn-val" style="background:var(--gold); color:#000; border:2px solid #00ff00;" onclick="awardToChallenger('${pid}')">${cp.name} GANÓ LA APUESTA ✅</button>`;
                        } else if (cp) {
                            h += `<button class="btn-val" style="background:#555; color:#888; cursor:not-allowed;" disabled>${cp.name} FALLÓ ❌</button>`;
                        }
                    }
                    document.getElementById('challenger-buttons').innerHTML = h;
                } else {
                    activePlayerIdx = (activePlayerIdx + 1) % players.length;
                    players[activePlayerIdx].canReload = true;
                    nextTurn();
                }
            }
        }

        function awardToChallenger(pid) {
            let cp = players.find(x => x.id === pid);
            if (cp) {
                cp.score++;
                cp.cards.push(parseInt(songs[currentSongIdx].year));
                cp.cards.sort(function(a,b){ return parseInt(a)-parseInt(b); });
                if (cp.score >= 10 && gameMode === 'normal') { showWinner(cp.name); return; }
            }
            activePlayerIdx = (activePlayerIdx + 1) % players.length;
            players[activePlayerIdx].canReload = true;
            nextTurn();
        }

        function showWinner(name) {
            document.getElementById('winner-name').innerText = name;
            let p = players.find(x => x.name === name);
            document.getElementById('winner-avatar-img').innerHTML = p.avatar ? `<img src="${p.avatar}" style="width:150px;height:150px;border-radius:50%;border:4px solid var(--neon);">` : p.name[0];
            document.getElementById('winner-screen').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function syncState() {
            var leaderName = "---", leaderScore = 0;
            if (players.length > 0) {
                var leader = players.reduce(function(prev, curr) { return prev.score > curr.score ? prev : curr; });
                leaderName = leader.name; leaderScore = leader.score;
            }
            var currentJudgeId = 'ALL';
            if (document.getElementById('lobby').style.display === 'none' && players.length > 0) {
                if (turnPhase === 'NORMAL' || turnPhase === 'KING_GUESS' || turnPhase === 'KING_SELECTION') {
                    var judgeIdx = (activePlayerIdx + 1) % players.length;
                    currentJudgeId = players[judgeIdx] ? players[judgeIdx].id : 'ALL';
                }
            }
            for (var id in connections) {
                var p = players.find(function(px) { return px.id.toLowerCase() === id.toLowerCase(); });
                var state = {
                    type: 'STATE_UPDATE',
                    players: players,
                    activePlayer: { id: players[activePlayerIdx] ? players[activePlayerIdx].id : null, name: players[activePlayerIdx] ? players[activePlayerIdx].name : null },
                    judgeId: currentJudgeId,
                    leader: { name: leaderName, score: leaderScore },
                    currentTrack: songs[currentSongIdx],
                    revealed: isRevealed,
                    isPlaying: isPlaying,
                    isMuted: isMuted,
                    muteTimeRemaining: muteTimeRemaining,
                    panicActive: panicActive,
                    panicTimer: panicTimer,
                    isFogActive: isFogActive,
                    joputismoLevel: joputismoLevel,
                    bettingAgainst: bettingAgainst,
                    bettingFor: bettingFor,
                    myCards: p ? p.cards : [],
                    myTokens: p ? p.tokens : 0,
                    myWildcards: p && p.wildcards !== undefined ? p.wildcards : 3,
                    canReload: p ? p.canReload : false,
                    activeTimeline: players[activePlayerIdx] ? players[activePlayerIdx].cards : [],
                    currentBets: currentBets,
                    activeGuess: activeGuess,
                    currentDuel: currentDuel,
                    duelResult: duelResult,
                    kingOptions: kingOptions,
                    cheatsEnabled: cheatsEnabled,
                    turnPhase: turnPhase,
                    hasShield: hasShield,
                    duelTriggered: duelTriggered,
                    gameStarted: document.getElementById('lobby').style.display === 'none'
                };
                try {
                    if (connections[id] && connections[id].open) connections[id].send(state);
                } catch(e) { console.warn("No se pudo enviar estado a", id, e); }
            }
            updateUI();
        }

        function updateUI() {
            var h = "";
            var sorted = players.slice().sort(function(a,b){ return b.score - a.score; });
            sorted.forEach(function(p) {
                var activeCls = players[activePlayerIdx] && p.id === players[activePlayerIdx].id ? 'active' : '';
                h += '<div class="leader-item ' + activeCls + '"><span>' + p.name + '</span><span>' + p.score + ' pts</span></div>';
            });
            document.getElementById('leaderboard-list').innerHTML = h;
            var invH = "";
            if (players[activePlayerIdx]) players[activePlayerIdx].cards.forEach(function(y){ invH += '<div class="mini-card">' + (isFogActive ? '????' : y) + '</div>'; });
            document.getElementById('active-player-inventory').innerHTML = invH;
            var timelinesHtml = "";
            players.forEach(function(p) {
                timelinesHtml += '<div class="player-row"><div style="font-size:0.6em;color:#888;">' + p.name + '</div><div class="slots">';
                for (var k = 0; k < 10; k++) {
                    timelinesHtml += '<div class="slot ' + (p.cards[k] ? 'filled' : '') + '">' + (p.cards[k] ? (isFogActive ? '????' : p.cards[k]) : '') + '</div>';
                }
                timelinesHtml += '</div></div>';
            });
            document.getElementById('global-timelines').innerHTML = timelinesHtml;
        }

        function setJoputismo(l) { joputismoLevel = parseInt(l); syncState(); }

        fetch('lista_final.txt?v=' + Date.now()).then(r => r.text()).then(t => {
            let lines = t.split('\n');
            lines.forEach((l, i) => {
                let p = l.replace(/\r/g, '').split('|');
                if (p.length > 3) {
                    let m = p[3] ? p[3].match(/[?&]v=([^&#\s]+)|youtu\.be\/([^?&#\s]+)/) : null;
                    if (m) songs.push({ artist: p[0], song: p[1], year: p[2], id: (m[1] || m[2]), line: i + 1, type: 'original' });
                }
            });
            songs.sort(() => Math.random() - 0.5);
            initPeer();
        });
    </script>
</body>
