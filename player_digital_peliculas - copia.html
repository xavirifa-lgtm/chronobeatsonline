<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#ff8800">
    <title>CHRONOBEATS - CINEMA EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Bungee&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --neon: #ff8800;
            --bg: #0d0d0d;
            --accent: #ff0055;
            --gold: #ffd700;
        }

        /* --- UI COMPACT & STANDARD: AURORA ELITE V1.6 --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #020202 !important;
            background-image: 
                radial-gradient(circle at 20% 30%, hsla(30, 100%, 15%, 0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, hsla(15, 100%, 15%, 0.15), transparent 40%),
                radial-gradient(circle at 50% 50%, hsla(25, 100%, 15%, 0.15), transparent 60%) !important;
            background-attachment: fixed !important;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
            overscroll-behavior: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 35px);
        }

        /* Standardized Glass Style */
        input, .collection-summary, .card-row, .modal-content, .btn-secondary, .ctrl-btn, .spec-btn, .sk-btn, .market-btn, #sabotage-grid .spec-btn, .tab-bar, .duel-mode-ui, #custom-alert > div, #custom-confirm > div, .card-face {
            background: rgba(15, 15, 15, 0.5) !important;
            backdrop-filter: blur(25px) saturate(200%) !important;
            -webkit-backdrop-filter: blur(25px) saturate(200%) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5) !important;
            position: relative;
        }

        /* PESTAÑAS UI */
        .tab-bar {
            display: flex;
            height: 65px;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }

        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-family: 'Bungee';
            font-size: 0.65em;
            cursor: pointer;
            transition: 0.3s;
            background: none;
            border: none;
        }

        .tab-btn.active {
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon);
        }

        .tab-content {
            display: none;
            width: 100%;
            height: 100%;
            min-height: 0;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 90px;
            flex-direction: column;
            align-items: center;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        .tab-content.active { display: flex; }

        /* STANDARDIZED BUTTONS */
        .btn {
            background: var(--neon);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-family: 'Bungee';
            width: 100%;
            max-width: 280px;
            cursor: pointer;
            font-size: 1.1em;
            box-shadow: 0 0 20px rgba(255, 136, 0, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        input {
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            max-width: 280px;
            margin-bottom: 12px;
            font-family: 'Montserrat';
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
        }

        #host-id { text-transform: uppercase; }

        .ctrl-btn {
            padding: 15px 5px;
            border-radius: 10px;
            font-family: 'Bungee';
            font-size: 0.85em;
            cursor: pointer;
            color: #fff;
        }

        .spec-btn {
            padding: 12px 5px;
            border-radius: 8px;
            font-family: 'Bungee';
            font-size: 0.8em;
            cursor: pointer;
            color: var(--gold);
            border-color: var(--gold) !important;
        }

        /* CARD UI */
        .card-container {
            flex: 0 0 280px;
            perspective: 1000px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 25px;
        }

        .card {
            height: 100%;
            aspect-ratio: 2/3;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            border: 2px solid var(--neon) !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-align: center;
        }

        .card-back { transform: rotateY(180deg); border-color: var(--accent) !important; }

        #c-artist { font-size: 0.75em; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
        #c-song { font-family: 'Limelight'; font-size: 1.5em; margin-bottom: 10px; line-height: 1.2; color: var(--neon); }
        #c-year { font-family: 'Bungee'; font-size: 4em; color: var(--accent); line-height: 0.9; }

        /* STATUS UI */
        #turn-status { font-family: 'Bungee'; color: var(--neon); font-size: 1.2em; margin: 10px 0; }
        .chip-display { font-family: 'Bungee'; color: var(--gold); font-size: 0.9em; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .neon-chip { width: 12px; height: 12px; background: #ff0055; border-radius: 50%; box-shadow: 0 0 10px #ff0055; }

        /* HUB & FAB */
        .btn-hub {
            position: fixed; top: calc(20px + env(safe-area-inset-top, 0px)); left: 20px; z-index: 10000;
            width: 50px; height: 50px; background: #000; border: 2px solid var(--neon); border-radius: 50%;
            display: flex !important; align-items: center; justify-content: center; color: var(--neon);
            text-decoration: none; font-family: 'Limelight'; font-size: 1.5em; box-shadow: 0 0 15px var(--neon);
        }

        /* OVERLAYS */
        .overlay-full {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9500; flex-direction: column;
            align-items: center; padding: 20px; overflow-y: auto;
        }

        .bet-slot {
            width: 30px; height: 30px; background: rgba(255, 136, 0, 0.1); border: 2px dashed var(--neon);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin: 4px auto; font-size: 0.6em; color: var(--neon); font-family: 'Bungee';
        }
        .bet-slot.occupied { background: var(--neon); color: #fff; border-style: solid; }
        .bet-slot.my-bet { background: var(--gold); border-color: var(--gold); color: #000; }
        .bet-slot.active-guess { background: #fff; border-color: #fff; color: #000; }
    </style>
</head>

<body>
    <a href="index.html" class="btn-hub" title="Volver al Hub">H</a>

    <!-- PANTALLA LOGIN -->
    <div id="login-screen" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
        <div class="logo" style="font-family:'Limelight'; color:var(--neon); text-shadow: 0 0 15px var(--neon); font-size:2em; text-align:center; margin-bottom:20px;">
            CHRONOBEATS <span style="font-size:0.4em; opacity:0.6; vertical-align:top; color:var(--gold);">CINEMA EDITION</span></div>

        <div id="avatar-container" onclick="document.getElementById('avatar-input').click()"
            style="display:flex; flex-direction:column; align-items:center; margin-bottom:15px; cursor:pointer;">
            <img id="avatar-preview" src="" alt="Avatar"
                style="display:none; width:100px; height:100px; border-radius:50%; object-fit:cover; border: 3px solid var(--neon);">
            <div id="avatar-placeholder" style="width:100px; height:100px; border-radius:12px; border: 3px dashed var(--neon); display:flex; align-items:center; justify-content:center; color:var(--neon); font-size:2.5em; font-family:'Bungee';">
                +
            </div>
            <div style="font-size: 0.6em; color: var(--neon); font-family: 'Bungee'; margin-top: 10px;">¡AUTO-SELFIE!</div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" capture="user" style="display:none;" onchange="handleAvatarSelect(event)">

        <input type="text" id="host-id" placeholder="CÓDIGO SALA" maxlength="6">
        <input type="text" id="player-name" placeholder="TU NOMBRE">
        <button class="btn" id="join-btn" onclick="conectar()">ENTRAR EN ESCENA</button>
    </div>

    <!-- PANTALLA JUEGO -->
    <div id="game-screen" style="display:none; flex:1; min-height:0; flex-direction:column; overflow:hidden;">
        <div id="tab-game" class="tab-content active">
            <div id="leaderboard-info" style="font-family:'Bungee'; font-size:0.6em; color:#888; text-align:center; width:100%;">
                <div style="color:var(--gold);">LÍDER: <span id="lb-leader-name">---</span> (<span id="lb-leader-cards">0</span>)</div>
                <div>YO: <span id="lb-me-cards">0</span> CARTAS</div>
            </div>
            
            <div id="turn-status">TURNO DE: <span id="cur-player">---</span></div>
            <div class="chip-display" id="my-tokens-ui">MIS FICHAS: </div>

            <!-- CONTROLES MÚSICA -->
            <div class="music-controls" id="m-ctrl" style="display:none; grid-template-columns: repeat(3, 1fr); gap:10px; width:100%; margin-bottom:15px;">
                <button class="ctrl-btn" style="background:#00ff88; color:#000;" onclick="send('PLAY')">PLAY</button>
                <button class="ctrl-btn" style="background:#fff; color:#000" onclick="send('PAUSE')">PAUSE</button>
                <button class="ctrl-btn" style="background:var(--accent); color:#000" onclick="send('STOP')">STOP</button>
            </div>

            <!-- CARTA CENTRAL -->
            <div class="card-container" id="normal-card-container">
                <div id="card" class="card">
                    <div class="card-face card-front">
                        <div style="font-family:'Limelight';color:var(--neon);opacity:0.2;font-size:2.5em;line-height:0.95;">CINEMA<br>BEATS</div>
                    </div>
                    <div class="card-face card-back">
                        <div id="c-artist">PELÍCULA</div>
                        <div id="c-song">TÍTULO</div>
                        <div id="c-year">1999</div>
                    </div>
                </div>
                <div id="wait-msg" style="font-family:'Bungee';opacity:0.4;font-size:0.8em;margin-top:15px;">ESPERANDO TRACK...</div>
            </div>

            <!-- MI CRONOLOGÍA -->
            <div class="collection-summary" style="width:100%; max-width:340px; margin-top:20px; padding:15px; border-radius:12px;">
                <h4 style="font-family:'Bungee'; font-size:0.75em; color:var(--neon); margin:0 0 10px 0; text-align:center;">MI CRONOLOGÍA</h4>
                <div id="my-cards-list" style="display:flex; flex-direction:column; gap:4px;"></div>
            </div>
            
            <!-- ACCIONES ESPECIALES -->
            <div class="special-actions" id="special-ctrl" style="display:none; flex-direction:column; gap:10px; width:100%; max-width:340px; margin-top:15px;">
                <button class="spec-btn" onclick="send('AUTO_WIN')">COMPRAR CARTA (3 🔵)</button>
                <button class="spec-btn" onclick="send('RELOAD_SONG')">CAMBIAR CANCIÓN (1 🔵)</button>
            </div>
        </div>

        <!-- BARRA PESTAÑAS -->
        <div class="tab-bar">
            <div class="tab-btn active" onclick="switchTab('tab-game', this)"><span>🎸</span><span>JUEGO</span></div>
        </div>
    </div>

    <script>
        var peer, conn, myId, playerName, lastState;
        var playerAvatarDataUrl = null;
        let connectTimeout;

        function status(msg) {
            const btn = document.getElementById('join-btn');
            if (btn) btn.innerText = msg;
        }

        function conectar() {
            var hostId = document.getElementById('host-id').value.toUpperCase().trim();
            playerName = document.getElementById('player-name').value.trim();
            if(!hostId || !playerName) return alert("FALTAN DATOS");

            localStorage.setItem('cb_player_name', playerName);
            const btn = document.getElementById('join-btn');
            btn.disabled = true;
            status("1/3: PEER...");

            if (connectTimeout) clearTimeout(connectTimeout);

            const iceServers = [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:global.stun.twilio.com:3478' },
                { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
            ];

            peer = new Peer({
                debug: 3, host: '0.peerjs.com', port: 443, secure: true, path: '/', pingInterval: 5000,
                config: { 'iceServers': iceServers }
            });

            peer.on('open', (id) => {
                myId = id;
                status("2/3: BUSCANDO...");
                connectTimeout = setTimeout(() => {
                    alert("¡TIEMPO AGOTADO! La red móvil es muy lenta.");
                    btn.disabled = false;
                    status("REINTENTAR");
                    if (peer) peer.destroy();
                }, 20000);

                conn = peer.connect("CB-HOST-" + hostId);
                conn.on('open', () => {
                    if (connectTimeout) clearTimeout(connectTimeout);
                    status("3/3: ENTRANDO...");
                    conn.send({ type: 'JOIN', name: playerName, avatar: playerAvatarDataUrl });
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'flex';
                });
                conn.on('data', handle);
                conn.on('close', () => location.reload());
                conn.on('error', (err) => {
                    if (connectTimeout) clearTimeout(connectTimeout);
                    alert("Error: " + err);
                    btn.disabled = false;
                    status("REINTENTAR");
                });
            });
            peer.on('error', (err) => {
                if (connectTimeout) clearTimeout(connectTimeout);
                alert("Error de Red: " + err.type);
                btn.disabled = false;
                status("REINTENTAR");
            });
        }

        function handle(data) {
            if (data.type === 'STATE_UPDATE') {
                lastState = data;
                updateUI(data);
            }
        }

        function updateUI(state) {
            document.getElementById('lb-leader-name').innerText = state.leader.name;
            document.getElementById('lb-leader-cards').innerText = state.leader.score;
            document.getElementById('lb-me-cards').innerText = state.myCards.length;
            document.getElementById('cur-player').innerText = state.activePlayer.name || "---";

            let chips = ""; for(let i=0; i<state.myTokens; i++) chips += '<span class="neon-chip"></span>';
            document.getElementById('my-tokens-ui').innerHTML = "MIS FICHAS: " + chips;

            const isMe = state.activePlayer.id === myId;
            document.getElementById('m-ctrl').style.display = isMe ? 'grid' : 'none';
            document.getElementById('special-ctrl').style.display = (isMe && !state.revealed) ? 'flex' : 'none';

            if (state.revealed) {
                document.getElementById('card').classList.add('flipped');
                document.getElementById('c-artist').innerText = state.currentTrack.artist;
                document.getElementById('c-song').innerText = state.currentTrack.song;
                document.getElementById('c-year').innerText = state.currentTrack.year;
            } else {
                document.getElementById('card').classList.remove('flipped');
            }

            let h = "";
            const timeline = isMe ? state.myCards : state.activeTimeline;
            h += renderSlot(0, state);
            timeline.forEach((year, idx) => {
                h += `<div class="card-row" style="padding:10px; text-align:center; font-family:'Bungee'; background:rgba(255,255,255,0.05); border-radius:5px;">${year}</div>`;
                h += renderSlot(idx + 1, state);
            });
            document.getElementById('my-cards-list').innerHTML = h;
        }

        function renderSlot(idx, state) {
            let cls = "bet-slot";
            let label = "";
            if (state.activeGuess === idx) { cls += " active-guess"; label = "X"; }
            for (let pid in state.currentBets) {
                if (state.currentBets[pid] === idx) {
                    if (pid === myId) { cls += " my-bet"; label = "YO"; }
                    else { cls += " occupied"; label = "🔘"; }
                }
            }
            return `<div class="${cls}" onclick="interactSlot(${idx})">${label}</div>`;
        }

        function interactSlot(idx) {
            const isMe = lastState.activePlayer.id === myId;
            if (isMe) {
                if (lastState.activeGuess !== null) return;
                send('GUESS', idx);
            } else {
                if (lastState.activeGuess === null) return;
                send('BET', idx);
            }
        }

        function send(type, value) {
            if (conn && conn.open) conn.send({ type: 'COMMAND', action: type, value: value });
        }

        function handleAvatarSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX = 150;
                    let w = img.width, h = img.height;
                    const ctx = canvas.getContext('2d');
                    if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } }
                    else { if (h > MAX) { w *= MAX/h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    playerAvatarDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('avatar-preview').src = playerAvatarDataUrl;
                    document.getElementById('avatar-preview').style.display = 'block';
                    document.getElementById('avatar-placeholder').style.display = 'none';
                    localStorage.setItem('cb_player_avatar', playerAvatarDataUrl);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    </script>
    <div style="position:fixed; bottom:5px; right:5px; font-size:10px; opacity:0.3; color:white; z-index:10000; font-family: 'Montserrat', sans-serif;">v149</div>
</body>
</html>
