<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#9d00ff">
    <title>HOST - CHRONOBEATS GAMER</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bungee&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --neon: #9d00ff;
            --bg: #0d0d0d;
            --accent: #ff0055;
            --gold: #ffd700;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .logo {
            font-family: 'Press Start 2P';
            font-size: 1.5em;
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon);
            text-align: center;
            margin-bottom: 20px;
        }

        #lobby {
            text-align: center;
            max-width: 600px;
            margin: auto;
            padding-top: 50px;
        }

        .room-code {
            font-family: 'Press Start 2P';
            font-size: 3em;
            color: var(--gold);
            letter-spacing: 10px;
            margin: 20px 0;
        }

        .music-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 320px;
            margin-top: 10px;
        }

        .player-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .player-tag {
            background: #222;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            font-family: 'Press Start 2P';
            font-size: 0.6em;
        }

        #dashboard {
            display: none;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        .active-player-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 1em;
            color: var(--neon);
            margin-top: 5px;
        }

        /* Reproductor invisible pero funcional */
        #player-container {
            position: absolute;
            top: -999px;
            left: -999px;
            opacity: 0.1;
        }

        #player-container iframe { width: 1px; height: 1px; border: none; }

        .validation-area {
            background: #111;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .val-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--neon);
            width: 100%;
            text-align: center;
        }

        .reveal-btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8em;
            cursor: pointer;
        }

        .btn-val {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7em;
            cursor: pointer;
        }

        .btn-ok { background: #00ff88; }
        .btn-fail { background: var(--accent); color: #fff; }

        .timeline-grid {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }

        .player-row { background: #161616; padding: 10px; border-radius: 10px; }

        .slot {
            min-width: 45px;
            height: 25px;
            background: #222;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #666;
        }

        .slot.filled { background: var(--neon); color: #000; font-weight: bold; border: 1px solid #fff; }

        .btn-start {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1em;
            cursor: pointer;
        }

        .mini-card {
            background: #222;
            border: 1px solid var(--neon);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: 'Press Start 2P';
            font-size: 0.5em;
            color: #fff;
        }

        .neon-chip {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00f2fe;
            border-radius: 50%;
            box-shadow: 0 0 8px #00f2fe;
            margin: 0 3px;
            vertical-align: middle;
        }

        .btn-hub {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            width: 50px;
            height: 50px;
            background: #000;
            border: 2px solid var(--neon);
            border-radius: 50%;
            display: flex !important;
            align-items: center;
            justify-content: center;
            color: var(--neon);
            text-decoration: none;
            font-family: 'Press Start 2P';
            font-size: 1.2em;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <a href="index.html" class="btn-hub" title="Volver al Hub">H</a>
    
    <div id="winner-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <h1 style="font-family:'Press Start 2P'; color:var(--gold); font-size:2em;">¡CARTA FINAL!</h1>
        <h2 id="winner-name" style="font-family:'Press Start 2P'; color:var(--neon); margin:20px 0;">---</h2>
        <button class="btn-start" onclick="location.reload()">REPLAY</button>
    </div>

    <div class="logo">CHRONOBEATS <span style="font-size:0.5em; opacity:0.6;">GAMER</span></div>
    
    <div id="live-room-code" style="display:none; position:fixed; top:20px; right:20px; background:var(--bg); border:1px solid var(--neon); color:var(--neon); padding:8px 15px; border-radius:10px; font-family:'Press Start 2P'; font-size:0.8em; z-index:10000;">
        CODE</div>

    <div id="lobby">
        <div class="room-code" id="join-code">------</div>
        <div class="player-list" id="lobby-players" style="margin-bottom: 20px;"></div>

        <div id="mode-selector" style="margin-bottom: 20px;">
            <label style="font-family: 'Press Start 2P'; color: var(--neon); font-size: 0.7em; display: block; margin-bottom: 10px;">LEVEL MODE</label>
            <select id="game-mode-select" style="padding: 10px; font-family: 'Montserrat'; font-size: 1em; border-radius: 8px; background: #222; color: #fff; border: 1px solid var(--neon);">
                <option value="normal">CLASSIC (WIN AT 10)</option>
                <option value="rey">BOSS MODE (FINAL GUESS)</option>
            </select>
        </div>

        <button class="btn-start" onclick="startGame()" style="display:none; margin-top: 20px;" id="start-btn">INSERT COIN</button>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <div style="text-align:center; margin-bottom:10px;">
                <p style="font-size: 0.6em; color: #888; font-family:'Press Start 2P';">TURN OF:</p>
                <div class="active-player-name" id="ui-current-player">---</div>
            </div>
            <div id="leaderboard-list"></div>
        </div>

        <div class="main-content">
            <div id="player-container">
                <div id="youtube-player"></div>
            </div>
            <div class="validation-area">
                <div class="val-card" id="val-card-ui" style="display:none;">
                    <p style="font-size: 0.6em; color: var(--neon); margin-bottom: 5px; font-family:'Press Start 2P';">STAGE: VIDEOJUEGOS</p>
                    <p id="ui-card-artist" style="font-size: 0.9em; color: #aaa; margin: 0; font-weight: bold;">????</p>
                    <h3 id="ui-card-song" style="margin: 5px 0; font-size: 1.2em;">????</h3>
                    <div id="ui-card-year" style="font-family: 'Press Start 2P'; font-size: 2.5em; color: var(--accent); margin-top: 5px;">????</div>
                    <button class="reveal-btn" id="btn-reveal-host" onclick="revealData()" style="display:block; margin: 15px auto;">REVELAR</button>
                    
                    <div class="actions" id="validation-buttons" style="display:none; gap: 10px; width: 100%; margin-top: 15px;">
                        <button class="btn-val btn-ok" onclick="validateResult(true, false)">ACERTÓ</button>
                        <button class="btn-val btn-ok" style="background:#ffd700;" onclick="validateResult(true, true)">PERFECT!</button>
                        <button class="btn-val btn-fail" onclick="validateResult(false, false)">FALLÓ</button>
                    </div>
                </div>
                <div id="host-instructions" style="font-family:'Press Start 2P'; font-size:0.6em;">WAITING...</div>
            </div>
        </div>
    </div>
    <div class="timeline-grid" id="global-timelines"></div>

    <script>
        var peer, roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        var ytPlayer, players = [], connections = {}, songs = [], currentSongIdx = -1, activePlayerIdx = 0, isRevealed = false;
        var gameMode = 'normal';

        document.getElementById('join-code').innerText = roomCode;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '1', width: '1', videoId: '',
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                document.getElementById('host-instructions').innerText = "REPRODUCIENDO...";
                syncState();
            }
            if (event.data === YT.PlayerState.ENDED) {
                document.getElementById('host-instructions').innerText = "TIEMPO AGOTADO";
                setTimeout(nextTurn, 3000);
            }
        }

        function initPeer() {
            peer = new Peer("CB-HOST-" + roomCode, {
                host: '0.peerjs.com', port: 443, secure: true, path: '/', pingInterval: 5000,
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
            });
            peer.on('open', (id) => {
                document.getElementById('live-room-code').innerText = roomCode;
                document.getElementById('live-room-code').style.display = 'block';
            });
            peer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'JOIN') {
                        var existing = players.find(p => p.name.toLowerCase() === data.name.toLowerCase());
                        if (existing) {
                            existing.id = conn.peer;
                            connections[conn.peer] = conn;
                        } else {
                            players.push({ id: conn.peer, name: data.name, avatar: data.avatar, score: 1, cards: [], tokens: 2, wildcards: 3 });
                            connections[conn.peer] = conn;
                        }
                        updateLobby();
                        syncState();
                    } else if (data.type === 'COMMAND') {
                        handlePlayerCommand(conn.peer, data.action, data.value);
                    }
                });
            });
        }

        function handlePlayerCommand(pid, action, value) {
            const isMe = players[activePlayerIdx].id === pid;
            if (action === 'PLAY' && isMe) ytPlayer.playVideo();
            if (action === 'PAUSE' && isMe) ytPlayer.pauseVideo();
            if (action === 'GUESS' && isMe) { activeGuess = value; syncState(); }
            if (action === 'BET' && !isMe) { currentBets[pid] = value; syncState(); }
        }

        var activeGuess = null;
        var currentBets = {};

        function revealData() {
            isRevealed = true;
            ytPlayer.pauseVideo();
            document.getElementById('ui-card-artist').innerText = songs[currentSongIdx].artist;
            document.getElementById('ui-card-song').innerText = songs[currentSongIdx].song;
            document.getElementById('ui-card-year').innerText = songs[currentSongIdx].year;
            document.getElementById('validation-buttons').style.display = 'flex';
            document.getElementById('btn-reveal-host').style.display = 'none';
            syncState();
        }

        function validateResult(success, perfect) {
            var p = players[activePlayerIdx];
            if (success) {
                p.cards.push(songs[currentSongIdx].year);
                p.cards.sort((a,b) => a-b);
                p.score = p.cards.length + 1;
                if (perfect) p.tokens++;
            }
            if (p.score >= 12) {
                document.getElementById('winner-name').innerText = p.name;
                document.getElementById('winner-screen').style.display = 'flex';
            } else {
                nextTurn();
            }
        }

        function nextTurn() {
            activePlayerIdx = (activePlayerIdx + 1) % players.length;
            currentSongIdx++;
            activeGuess = null;
            currentBets = {};
            isRevealed = false;
            
            if (songs[currentSongIdx]) {
                ytPlayer.loadVideoById(songs[currentSongIdx].id);
                ytPlayer.pauseVideo();
            }

            document.getElementById('ui-card-artist').innerText = "????";
            document.getElementById('ui-card-song').innerText = "????";
            document.getElementById('ui-card-year').innerText = "????";
            document.getElementById('validation-buttons').style.display = 'none';
            document.getElementById('btn-reveal-host').style.display = 'block';
            document.getElementById('ui-current-player').innerText = players[activePlayerIdx].name;
            
            syncState();
        }

        function syncState() {
            players.forEach(p => {
                if (connections[p.id]) {
                    connections[p.id].send({
                        type: 'STATE_UPDATE',
                        leader: players.reduce((prev, current) => (prev.score > current.score) ? prev : current),
                        activePlayer: { id: players[activePlayerIdx].id, name: players[activePlayerIdx].name },
                        myCards: p.cards,
                        myTokens: p.tokens,
                        myWildcards: p.wildcards,
                        activeTimeline: players[activePlayerIdx].cards,
                        revealed: isRevealed,
                        currentTrack: isRevealed ? songs[currentSongIdx] : { artist: '???', song: '???', year: '???' },
                        activeGuess: activeGuess,
                        currentBets: currentBets,
                        isPlaying: true // Simplified
                    });
                }
            });
            updateLeaderboard();
        }

        function updateLeaderboard() {
            let h = "";
            players.sort((a,b) => b.score - a.score).forEach(p => {
                h += `<div class="player-tag">${p.name}: ${p.score}</div>`;
            });
            document.getElementById('leaderboard-list').innerHTML = h;
        }

        function updateLobby() {
            let h = "";
            players.forEach(p => h += `<div class="player-tag">${p.name}</div>`);
            document.getElementById('lobby-players').innerHTML = h;
            if (players.length > 0) document.getElementById('start-btn').style.display = 'block';
        }

        function startGame() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
            nextTurn();
        }

        fetch('lista_videojuegos.txt?v=' + new Date().getTime()).then(r => r.text()).then(t => {
            songs = t.split('\n').map(l => {
                let p = l.split('|');
                let m = p[3] ? p[3].match(/[?&]v=([^&#]+)|youtu\.be\/([^?&#]+)/) : null;
                return { artist: p[0], song: p[1], year: p[2], id: m ? (m[1]||m[2]) : null };
            }).filter(s => s.id).sort(() => Math.random() - 0.5);
            initPeer();
        });
    </script>
</body>
</html>
