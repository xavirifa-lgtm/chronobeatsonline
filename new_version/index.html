<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#00f2ff">
    <title>CHRONOBEATS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cyan:   #00f2ff;
            --pink:   #ff00cc;
            --gold:   #ffaa00;
            --purple: #bf00ff;
            --green:  #00ff41;
            --bg:     #020810;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        /* ── FONDO ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,242,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,242,255,0.025) 1px, transparent 1px);
            background-size: 55px 55px;
            animation: grid-drift 25s linear infinite;
            z-index: 0;
        }
        @keyframes grid-drift {
            from { transform: translate(0,0); }
            to   { transform: translate(55px,55px); }
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.18;
            z-index: 0;
        }
        .orb-1 { width: 450px; height: 450px; background: var(--cyan);   top: -120px; left: -120px; }
        .orb-2 { width: 400px; height: 400px; background: var(--pink);   bottom: -80px; right: -80px; }
        .orb-3 { width: 280px; height: 280px; background: var(--purple); top: 35%; left: 55%; }

        /* ── SPLASH ── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            transition: opacity 0.9s ease, transform 0.9s ease;
        }
        #splash.hidden {
            opacity: 0;
            transform: scale(1.04);
            pointer-events: none;
        }

        /* Logo imagen */
        .splash-img {
            width: min(340px, 82vw);
            height: auto;
            animation: logo-in 1s cubic-bezier(0.16,1,0.3,1) both;
            filter:
                drop-shadow(0 0 18px rgba(0,242,255,0.6))
                drop-shadow(0 0 40px rgba(255,0,204,0.35));
        }
        @keyframes logo-in {
            from { opacity:0; transform: translateY(30px) scale(0.92); }
            to   { opacity:1; transform: translateY(0) scale(1); }
        }

        /* Tagline ONLINE */
        .splash-tagline {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: clamp(0.65em, 2.5vw, 0.9em);
            letter-spacing: 14px;
            margin-top: -6px;
            margin-bottom: 0;
            opacity: 0;
            animation: tag-in 0.7s ease 0.7s both;
            /* Split color: mitad cyan mitad pink */
            background: linear-gradient(90deg, var(--cyan) 50%, var(--pink) 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @keyframes tag-in {
            from { opacity:0; letter-spacing: 22px; }
            to   { opacity:1; letter-spacing: 14px; }
        }

        /* Divisor */
        .splash-line {
            width: 180px;
            height: 1px;
            margin: 32px auto;
            opacity: 0;
            animation: line-in 0.5s ease 1s both;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), transparent);
        }
        @keyframes line-in {
            from { opacity:0; width: 0; }
            to   { opacity:1; width: 180px; }
        }

        /* Botón JUGAR */
        .splash-btn {
            opacity: 0;
            animation: btn-in 0.6s ease 1.2s both;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            position: relative;
        }
        @keyframes btn-in {
            from { opacity:0; transform: translateY(12px); }
            to   { opacity:1; transform: translateY(0); }
        }
        .splash-btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 56px;
            border-radius: 50px;
            font-family: 'Bungee', sans-serif;
            font-size: 1.1em;
            letter-spacing: 5px;
            color: #000;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            box-shadow:
                0 0 20px rgba(0,242,255,0.4),
                0 0 40px rgba(255,0,204,0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .splash-btn:hover .splash-btn-inner {
            transform: translateY(-2px) scale(1.03);
            box-shadow:
                0 0 35px rgba(0,242,255,0.6),
                0 0 60px rgba(255,0,204,0.4);
        }
        .splash-btn:active .splash-btn-inner {
            transform: scale(0.97);
        }

        /* Scanlines sutiles sobre el splash */
        #splash::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.06) 3px,
                rgba(0,0,0,0.06) 4px
            );
            pointer-events: none;
        }

        /* ── APP PRINCIPAL ── */
        #app {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 30px;
            opacity: 0;
            transform: translateY(18px);
            pointer-events: none;
            transition: opacity 0.7s ease 0.15s, transform 0.7s ease 0.15s;
            overflow-y: auto;
        }
        #app.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        /* Mini logo en app */
        .app-logo-img {
            width: min(200px, 55vw);
            height: auto;
            margin-bottom: 6px;
            filter:
                drop-shadow(0 0 10px rgba(0,242,255,0.5))
                drop-shadow(0 0 22px rgba(255,0,204,0.3));
        }
        .app-tagline {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 0.55em;
            letter-spacing: 10px;
            margin-bottom: 24px;
            background: linear-gradient(90deg, var(--cyan) 50%, var(--pink) 50%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Selector de categorías */
        .mix-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 18px;
            padding: 18px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 16px;
            backdrop-filter: blur(16px);
        }
        .mix-label {
            font-size: 0.58em;
            font-weight: 900;
            letter-spacing: 3px;
            color: #444;
            text-align: center;
            margin-bottom: 14px;
        }
        .mix-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .mix-chip {
            background: rgba(255,255,255,0.04);
            border: 1px solid #222;
            color: #444;
            padding: 13px 8px;
            border-radius: 12px;
            font-size: 0.62em;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
            user-select: none;
        }
        .mix-chip:active { transform: scale(0.95); }

        /* Colores propios de cada categoría */
        .mix-chip[data-type="orig"].active {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0,242,255,0.08);
            box-shadow: 0 0 14px rgba(0,242,255,0.25);
        }
        .mix-chip[data-type="movies"].active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(255,170,0,0.08);
            box-shadow: 0 0 14px rgba(255,170,0,0.25);
        }
        .mix-chip[data-type="anime"].active {
            border-color: var(--pink);
            color: var(--pink);
            background: rgba(255,0,204,0.08);
            box-shadow: 0 0 14px rgba(255,0,204,0.25);
        }
        .mix-chip[data-type="videojuegos"].active {
            border-color: var(--purple);
            color: var(--purple);
            background: rgba(191,0,255,0.08);
            box-shadow: 0 0 14px rgba(191,0,255,0.25);
        }

        /* Botones */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 360px;
        }
        .btn-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 72px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-family: 'Bungee', sans-serif;
            font-size: 0.92em;
            letter-spacing: 2px;
            transition: 0.25s;
            text-decoration: none;
            position: relative;
        }
        .btn-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.5em;
            font-weight: 400;
            letter-spacing: 1px;
            margin-top: 4px;
            opacity: 0.7;
        }
        /* Host: gradiente cyan→pink como el logo */
        .btn-host {
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            color: #000;
            box-shadow: 0 0 20px rgba(0,242,255,0.3), 0 0 35px rgba(255,0,204,0.2);
        }
        .btn-host:hover {
            box-shadow: 0 0 35px rgba(0,242,255,0.55), 0 0 55px rgba(255,0,204,0.35);
            transform: translateY(-2px);
        }
        /* Player: outline cyan */
        .btn-player {
            background: transparent;
            color: var(--cyan);
            border: 2px solid var(--cyan);
        }
        .btn-player:hover {
            background: rgba(0,242,255,0.07);
            box-shadow: 0 0 22px rgba(0,242,255,0.25);
            transform: translateY(-2px);
        }

        @media (max-height: 620px) {
            .app-logo-img { width: min(150px, 45vw); margin-bottom: 4px; }
            .mix-box { padding: 14px; margin-bottom: 12px; }
            .btn-action { height: 60px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- ══ SPLASH ══ -->
    <div id="splash">
        <img src="logo_cyberpunk.png" alt="ChronoBeats" class="splash-img"/>
        <div class="splash-tagline">ONLINE</div>
        <div class="splash-line"></div>
        <button class="splash-btn" onclick="enterApp()">
            <div class="splash-btn-inner">JUGAR</div>
        </button>
    </div>

    <!-- ══ APP ══ -->
    <div id="app">
        <img src="logo_cyberpunk.png" alt="ChronoBeats" class="app-logo-img"/>
        <div class="app-tagline">ONLINE</div>

        <div class="mix-box">
            <div class="mix-label">SELECCIONA CATEGORÍAS</div>
            <div class="mix-grid">
                <div class="mix-chip active" data-type="orig"        onclick="toggleMix(this)">🎵 ORIGINAL</div>
                <div class="mix-chip active" data-type="movies"      onclick="toggleMix(this)">🎬 PELIS &amp; TV</div>
                <div class="mix-chip active" data-type="anime"       onclick="toggleMix(this)">⛩️ ANIME</div>
                <div class="mix-chip active" data-type="videojuegos" onclick="toggleMix(this)">🎮 GAMER</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-action btn-host" onclick="goToHost()">
                CENTRO DE CONTROL
                <span class="btn-sub">TABLET · PC · HOST</span>
            </button>
            <a href="player_digital_mix.html" class="btn-action btn-player">
                MANDO JUGADOR
                <span class="btn-sub">MÓVIL · PLAYER</span>
            </a>
        </div>
    </div>

    <script>
        function enterApp() {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('app').classList.add('visible');
        }

        function toggleMix(el) {
            el.classList.toggle('active');
        }

        function goToHost() {
            const active = Array.from(document.querySelectorAll('.mix-chip.active')).map(c => c.dataset.type);
            if (active.length === 0) {
                alert("Selecciona al menos una categoría.");
                return;
            }
            window.location.href = 'host_digital_mix.html?mix=' + active.join(',');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        });
                    });
                });
            });
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) { window.location.reload(); refreshing = true; }
            });
        }
    </script>
</body>
</html>
