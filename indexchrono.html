<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOBEATS ORIGINAL - SELECCIÓN</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #020202;
            --gold: #ffd700;
            --glass: rgba(15, 15, 15, 0.6);
            --aurora-1: hsla(180, 100%, 15%, 0.15);
            --aurora-2: hsla(280, 100%, 15%, 0.15);
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, var(--aurora-1), transparent 40%),
                radial-gradient(circle at 80% 70%, var(--aurora-2), transparent 40%);
            background-attachment: fixed;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .logo {
            font-family: 'Bungee';
            font-size: 2.5em;
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon);
            text-align: center;
            margin-bottom: 50px;
            line-height: 1.1;
        }

        .logo span {
            font-size: 0.4em;
            color: var(--neon); /* Cyan restaurado */
            display: block;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 360px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 22px;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            color: #ccc;
            text-decoration: none;
            font-family: 'Bungee';
            font-size: 0.9em;
            border-radius: 50px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        .btn-gold {
            border-color: rgba(255, 215, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            border-color: var(--neon);
            color: var(--neon);
            box-shadow: 0 15px 35px rgba(0, 242, 255, 0.2);
            background: rgba(0, 242, 255, 0.05);
        }

        .btn-gold:hover {
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 15px 35px rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.05);
        }

        .btn-back {
            margin-top: 30px;
            font-size: 0.7em;
            opacity: 0.6;
            border-color: transparent;
            background: transparent;
            backdrop-filter: none;
            box-shadow: none;
        }

        .btn-back:hover {
            opacity: 1;
            transform: none;
            border-color: #444;
            background: transparent;
            box-shadow: none;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="logo">CHRONOBEATS<span>MODO ORIGINAL</span></div>
    <div class="btn-container">
        <a href="host_digital.html" class="btn btn-gold">CENTRO DE CONTROL<br><span style="font-family:'Montserrat'; font-size:0.7em; opacity:0.7;">(Tablet / PC)</span></a>
        <a href="player_digital.html" class="btn">MANDO JUGADOR<br><span style="font-family:'Montserrat'; font-size:0.7em; opacity:0.7;">(Móvil)</span></a>
        <a href="index.html" class="btn btn-back">VOLVER AL MENÚ</a>
    </div>
</body>
</html>
