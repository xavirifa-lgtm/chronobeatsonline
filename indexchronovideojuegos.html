<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOBEATS VIDEOJUEGOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Montserrat:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon: #bf00ff;
            --bg: #050505;
            --gold: #00f2fe;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(280, 50%, 15%, 1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(280, 50%, 15%, 1) 0, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .logo {
            font-family: 'Press Start 2P';
            font-size: 1.5em;
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon);
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            display: block;
            width: 320px;
            padding: 22px;
            background: rgba(191, 0, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: #ddd;
            text-decoration: none;
            font-family: 'Press Start 2P';
            font-size: 0.7em;
            border-radius: 15px;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            border-color: var(--neon);
            color: var(--neon);
            background: rgba(191, 0, 255, 0.15);
            box-shadow: 0 0 30px rgba(191, 0, 255, 0.4);
            transform: translateY(-5px);
        }

        .btn-gold {
            background: rgba(0, 242, 254, 0.05);
        }

        .btn-gold:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(0, 242, 254, 0.15);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>

<body>
    <div class="logo">CHRONOBEATS<br><span style="font-size:0.4em; color:var(--gold);">VIDEO GAMES EDITION</span></div>
    <div class="btn-container">
        <a href="host_digital_videojuegos.html" class="btn btn-gold">SELECT LEVEL <span
                style="font-family:'Montserrat'; font-size: 0.7em;">(Host)</span></a>
        <a href="player_digital_videojuegos.html" class="btn">START PLAYER <span
                style="font-family:'Montserrat'; font-size: 0.7em;">(Móvil)</span></a>
        <a href="index.html" class="btn" style="border-color:#333; color:#555; margin-top:20px;">BACK TO MENU</a>
    </div>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        });
                    });
                });
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
</body>

</html>
