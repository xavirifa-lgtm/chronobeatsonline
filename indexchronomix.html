<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOBEATS MIX - SELECCIÓN</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff00;
            --bg: #020202;
            --gold: #fff;
            --glass: rgba(15, 15, 15, 0.6);
            --aurora-1: hsla(120, 100%, 15%, 0.15);
            --aurora-2: hsla(180, 100%, 15%, 0.15);
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, var(--aurora-1), transparent 40%),
                radial-gradient(circle at 80% 70%, var(--aurora-2), transparent 40%);
            background-attachment: fixed;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo {
            font-family: 'Montserrat';
            font-weight: 900;
            font-size: 2.5em;
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon);
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .logo span {
            font-size: 0.35em;
            color: var(--gold);
            display: block;
            margin-top: 10px;
            letter-spacing: 5px;
            font-weight: 700;
        }

        .mix-selector {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 360px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .mix-title {
            font-size: 0.7em;
            font-weight: 900;
            color: #888;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
        }

        .mix-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .mix-chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: #555;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .mix-chip.active {
            background: rgba(0, 255, 0, 0.1);
            border-color: var(--neon);
            color: var(--neon);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 360px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            color: #ccc;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9em;
            border-radius: 50px;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            border-color: var(--neon);
            color: var(--neon);
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.2);
        }

        .btn-back {
            margin-top: 20px;
            font-size: 0.7em;
            opacity: 0.6;
            border-color: transparent;
            background: transparent;
        }

        .btn-back:hover {
            opacity: 1;
            border-color: #444;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="logo">CHRONOBEATS<span>MIX MODE</span></div>
    
    <div class="mix-selector">
        <div class="mix-title">CONFIGURAR MEZCLA</div>
        <div class="mix-grid">
            <div class="mix-chip active" data-type="orig" onclick="toggleMix(this)">ORIGINAL</div>
            <div class="mix-chip active" data-type="movies" onclick="toggleMix(this)">PELIS</div>
            <div class="mix-chip active" data-type="anime" onclick="toggleMix(this)">ANIME</div>
            <div class="mix-chip active" data-type="videojuegos" onclick="toggleMix(this)">GAMER</div>
        </div>
    </div>

    <div class="btn-container">
        <button onclick="goToHost()" class="btn" style="cursor:pointer; font-family:inherit;">CENTRO DE CONTROL<br><span style="font-size:0.7em; opacity:0.7; font-weight:400;">(Tablet / PC)</span></button>
        <a href="player_digital_mix.html" class="btn">MANDO JUGADOR<br><span style="font-size:0.7em; opacity:0.7; font-weight:400;">(Móvil)</span></a>
        <a href="index.html" class="btn btn-back">VOLVER AL MENÚ</a>
    </div>

    <script>
        function toggleMix(el) {
            el.classList.toggle('active');
        }

        function goToHost() {
            const active = Array.from(document.querySelectorAll('.mix-chip.active')).map(c => c.dataset.type);
            if (active.length === 0) {
                alert("Selecciona al menos una categoría para mezclar.");
                return;
            }
            window.location.href = `host_digital_mix.html?mix=${active.join(',')}`;
        }
    </script>
</body>
</html>
