<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOBEATS MIX MODE</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon: #00ff00;
            --bg: #0d0d0d;
            --gold: #ffd700;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .logo {
            font-family: 'Bungee';
            font-size: 2em;
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon);
            text-align: center;
            margin-bottom: 40px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            display: block;
            width: 320px;
            padding: 22px;
            border: 2px solid #333;
            text-align: center;
            color: #888;
            text-decoration: none;
            font-family: 'Bungee';
            font-size: 0.9em;
            border-radius: 50px;
            transition: 0.4s;
            cursor: pointer;
            background: transparent;
            box-sizing: border-box;
        }

        .btn:hover {
            border-color: var(--neon);
            color: var(--neon);
            background: rgba(0, 255, 0, 0.05);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            transform: translateY(-3px);
        }

        .btn-gold {
            border-color: #444;
            color: #aaa;
        }

        .btn-gold:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(255, 215, 0, 0.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        /* Modal Selector de Mix */
        #mix-selector-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .mix-modal-content {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--neon);
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }

        .mix-modal-content h2 {
            font-family: 'Bungee';
            color: var(--neon);
            margin-bottom: 25px;
            font-size: 1.2em;
        }

        .mix-option {
            display: block;
            width: 100%;
            padding: 15px;
            border: 1px solid #333;
            text-align: center;
            color: #ddd;
            text-decoration: none;
            font-family: 'Orbitron', 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 1.5px;
            border-radius: 10px;
            transition: 0.3s;
            margin-bottom: 15px;
            cursor: pointer;
            background: #1a1a1a;
        }

        .mix-option:hover {
            border-color: var(--neon);
            background: rgba(0, 255, 0, 0.1);
        }

        .mix-close {
            margin-top: 20px;
            color: #888;
            cursor: pointer;
            font-size: 0.9em;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="logo">CHRONOBEATS<br><span style="font-size:0.5em; color:#fff;">MIX MODE</span></div>
    <div class="btn-container">
        <button onclick="openMixSelector()" class="btn btn-gold">CENTRO DE CONTROL <span
                style="font-size: 0.7em;">(Tablet)</span></button>
        <a href="player_digital_mix.html" class="btn">MANDO JUGADOR <span style="font-size: 0.7em;">(Móvil)</span></a>
        <a href="index.html" class="btn" style="border-color:#333; color:#555; margin-top:20px;">VOLVER AL MENÚÚ</a>
    </div>

    <!-- Modal Seleccionador de Host Mix -->
    <div id="mix-selector-modal">
        <div class="mix-modal-content">
            <h2>ELIJA LAS LISTAS A MEZCLAR</h2>
            <button class="mix-option" onclick="startHost('orig,anime,movies')">MIX TOTAL</button>
            <button class="mix-option" onclick="startHost('orig,anime')">CLÁSICO + ANIME</button>
            <button class="mix-option" onclick="startHost('orig,movies')">CLÁSICO + PELIS</button>
            <button class="mix-option" onclick="startHost('anime,movies')">ANIME + PELIS</button>
            <div class="mix-close" onclick="closeMixSelector()">Cancelar</div>
        </div>
    </div>

    <script>
        function openMixSelector() {
            document.getElementById('mix-selector-modal').style.display = 'flex';
        }

        function closeMixSelector() {
            document.getElementById('mix-selector-modal').style.display = 'none';
        }

        function startHost(mixConfig) {
            window.location.href = "host_digital_mix.html?mix=" + mixConfig;
        }
    </script>
</body>

</html>
