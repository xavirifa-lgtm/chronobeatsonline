<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHRONOBEATS - Game Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Montserrat:wght@400;700&family=Limelight&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --neon: #00f2fe;
            --gold: #ffaa00;
            --accent: #ff0055;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .hub-title {
            padding-top: 20px;
            font-family: 'Bungee';
            font-size: 3em;
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .cards-container {
            display: flex;
            gap: 15px;
            flex-wrap: nowrap;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .game-card {
            flex: 0 0 230px;
            height: 360px;
            background: #111;
            border: 2px solid #333;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
        }

        .card-logo {
            font-family: 'Bungee';
            font-size: 2.5em;
            line-height: 0.9;
            margin-bottom: 20px;
            z-index: 2;
        }

        .card-sub {
            display: block;
            font-size: 0.35em;
            font-family: 'Montserrat';
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Original */
        .card-original {
            border-color: var(--neon);
            color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        .card-original:hover {
            box-shadow: 0 10px 40px rgba(0, 242, 254, 0.4), inset 0 0 20px rgba(0, 242, 254, 0.2);
            background: #0a1616;
        }

        .card-original .card-logo {
            text-shadow: 0 0 15px var(--neon);
        }

        /* Anime */
        .card-anime {
            border-color: #ff00ff;
            color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.1);
        }

        .card-anime:hover {
            box-shadow: 0 10px 40px rgba(255, 0, 255, 0.4), inset 0 0 20px rgba(255, 0, 255, 0.2);
            background: #160a16;
        }

        .card-anime .card-logo {
            text-shadow: 0 0 15px #ff00ff;
        }

        /* Movies */
        .card-movies {
            border-color: #ffaa00;
            color: #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.1);
        }

        .card-movies:hover {
            box-shadow: 0 10px 40px rgba(255, 170, 0, 0.4), inset 0 0 20px rgba(255, 170, 0, 0.2);
            background: #16120a;
        }

        .card-movies .card-logo {
            font-family: 'Limelight';
            text-shadow: 0 0 15px #ffaa00;
        }

        /* Mix */
        .card-mix {
            border-color: #00ff00;
            color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        .card-mix:hover {
            box-shadow: 0 10px 40px rgba(0, 255, 0, 0.4), inset 0 0 20px rgba(0, 255, 0, 0.2);
            background: #0a160a;
        }

        .card-mix .card-logo {
            font-family: 'Montserrat';
            font-weight: 700;
            text-shadow: 0 0 15px #00ff00;
        }

        /* Videojuegos */
        .card-games {
            border-color: #bf00ff;
            color: #bf00ff;
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.1);
        }
        .card-games:hover {
            box-shadow: 0 10px 40px rgba(191, 0, 255, 0.4), inset 0 0 20px rgba(191, 0, 255, 0.2);
            background: #120a16;
        }
        .card-games .card-logo {
            font-family: 'Press Start 2P';
            font-size: 1.5em; 
            text-shadow: 0 0 15px #bf00ff;
        }

        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
                overflow-y: auto;
                justify-content: flex-start;
                padding: 40px 0;
            }

            .hub-title {
                font-size: 1.5em;
                margin-bottom: 30px;
            }

            .cards-container {
                flex-direction: column;
                align-items: center;
                gap: 25px;
                padding: 20px 0;
                overflow-x: hidden;
            }

            .game-card {
                flex: 0 0 auto;
                width: 85%;
                height: 200px;
            }

            .card-logo {
                font-size: 2.2em;
            }
        }
    
</style>
</head>

<body>
    <div class="hub-title">CHOOSE YOUR EDITION</div>

    <div class="cards-container">
        <a href="indexchrono.html" class="game-card card-original">
            <div class="card-logo">
                CHRONO<br>BEATS
                <span class="card-sub">MODO ORIGINAL</span>
            </div>
        </a>

        <a href="indexchronoanime.html" class="game-card card-anime">
            <div class="card-logo">
                CHRONO<br>BEATS
                <span class="card-sub">ANIME VERSION</span>
            </div>
        </a>

        <a href="indexchronomovies.html" class="game-card card-movies">
            <div class="card-logo">
                CHRONO<br>BEATS
                <span class="card-sub">MOVIES & TV SHOWS</span>
            </div>
        </a>

        <a href="indexchronomix.html" class="game-card card-mix">
            <div class="card-logo">
                CHRONO<br>BEATS
                <span class="card-sub">MIX MODE</span>
            </div>
        </a>

        <a href="indexchronovideojuegos.html" class="game-card card-games">
            <div class="card-logo">
                CHRONO<br>BEATS
                <span class="card-sub">GAMER EDITION</span>
            </div>
        </a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        });
                    });
                });
            });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
</body>
</html>
